<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980" role="img" aria-labelledby="title desc">
  <title id="title">Epicurious Comment Intelligence Technical Architecture</title>
  <desc id="desc">A system diagram showing raw CSV inputs flowing through a Python pipeline into generated artifacts, then into a Next.js web application used by recipe editors.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8f5ef"/>
      <stop offset="100%" stop-color="#f1ebe1"/>
    </linearGradient>
    <linearGradient id="pipeline" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#214e57"/>
      <stop offset="100%" stop-color="#16363d"/>
    </linearGradient>
    <linearGradient id="web" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#d96c3f"/>
      <stop offset="100%" stop-color="#b9552d"/>
    </linearGradient>
    <linearGradient id="artifact" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ece5d8"/>
      <stop offset="100%" stop-color="#ddd1bd"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2c3a3f"/>
    </marker>
    <style>
      .title { font: 700 34px Georgia, "Times New Roman", serif; fill: #1d2426; }
      .subtitle { font: 400 16px "Helvetica Neue", Helvetica, Arial, sans-serif; fill: #4b575b; }
      .section { font: 700 18px "Helvetica Neue", Helvetica, Arial, sans-serif; fill: #1d2426; letter-spacing: 0.08em; text-transform: uppercase; }
      .cardTitleDark { font: 700 20px "Helvetica Neue", Helvetica, Arial, sans-serif; fill: #ffffff; }
      .cardBodyDark { font: 400 15px "Helvetica Neue", Helvetica, Arial, sans-serif; fill: #eaf3f4; }
      .cardTitle { font: 700 18px "Helvetica Neue", Helvetica, Arial, sans-serif; fill: #1d2426; }
      .cardBody { font: 400 15px "Helvetica Neue", Helvetica, Arial, sans-serif; fill: #364144; }
      .small { font: 400 13px "Helvetica Neue", Helvetica, Arial, sans-serif; fill: #5d6a6e; }
      .pill { font: 700 12px "Helvetica Neue", Helvetica, Arial, sans-serif; fill: #214e57; letter-spacing: 0.06em; }
      .arrowLabel { font: 600 13px "Helvetica Neue", Helvetica, Arial, sans-serif; fill: #2c3a3f; }
      .shadow { filter: drop-shadow(0 10px 24px rgba(35, 42, 45, 0.10)); }
    </style>
  </defs>

  <rect width="1600" height="980" fill="url(#bg)"/>

  <text x="80" y="78" class="title">Epicurious Comment Intelligence</text>
  <text x="80" y="108" class="subtitle">Technical architecture from raw recipe comments to deterministic editorial review, optional AI enrichment, and evidence-backed exploration</text>

  <text x="90" y="168" class="section">Inputs</text>
  <g class="shadow">
    <rect x="80" y="195" rx="24" ry="24" width="280" height="168" fill="#fffdfa" stroke="#d7cab6"/>
    <text x="110" y="235" class="cardTitle">Comment Corpus</text>
    <text x="110" y="265" class="cardBody">`data/comments_sample.csv`</text>
    <text x="110" y="295" class="cardBody">Raw user comment text</text>
    <text x="110" y="320" class="cardBody">Metadata, timestamps,</text>
    <text x="110" y="343" class="cardBody">display name, location</text>
  </g>
  <g class="shadow">
    <rect x="80" y="392" rx="24" ry="24" width="280" height="188" fill="#fffdfa" stroke="#d7cab6"/>
    <text x="110" y="432" class="cardTitle">Recipe Metadata</text>
    <text x="110" y="462" class="cardBody">`data/Recipe_data.csv`</text>
    <text x="110" y="492" class="cardBody">`data/recipe_saves.csv`</text>
    <text x="110" y="522" class="cardBody">Titles, authors, tags,</text>
    <text x="110" y="545" class="cardBody">pageviews, app saves,</text>
    <text x="110" y="568" class="cardBody">web saves, URLs</text>
  </g>

  <text x="442" y="168" class="section">Python Pipeline</text>
  <g class="shadow">
    <rect x="410" y="195" rx="28" ry="28" width="450" height="520" fill="url(#pipeline)"/>
    <rect x="448" y="240" rx="18" ry="18" width="375" height="74" fill="rgba(255,255,255,0.10)" stroke="rgba(255,255,255,0.20)"/>
    <text x="472" y="270" class="cardTitleDark">1. Clean + Normalize</text>
    <text x="472" y="295" class="cardBodyDark">`load_data.py`, `build_recipe_master.py`</text>

    <rect x="448" y="335" rx="18" ry="18" width="375" height="74" fill="rgba(255,255,255,0.10)" stroke="rgba(255,255,255,0.20)"/>
    <text x="472" y="365" class="cardTitleDark">2. Tag Comment Signals</text>
    <text x="472" y="390" class="cardBodyDark">`tag_comment_signals.py`</text>

    <rect x="448" y="430" rx="18" ry="18" width="375" height="92" fill="rgba(255,255,255,0.10)" stroke="rgba(255,255,255,0.20)"/>
    <text x="472" y="460" class="cardTitleDark">3. Build Deterministic Intelligence</text>
    <text x="472" y="485" class="cardBodyDark">`build_recipe_intelligence.py`</text>
    <text x="472" y="508" class="cardBodyDark">Classification, issue diagnosis, recommendation</text>

    <rect x="448" y="543" rx="18" ry="18" width="375" height="92" fill="rgba(255,255,255,0.10)" stroke="rgba(255,255,255,0.20)"/>
    <text x="472" y="573" class="cardTitleDark">4. Select Supporting Evidence</text>
    <text x="472" y="598" class="cardBodyDark">`build_evidence_candidates.py`</text>
    <text x="472" y="621" class="cardBodyDark">`build_recipe_evidence.py`</text>

    <rect x="448" y="656" rx="18" ry="18" width="180" height="40" fill="#f5e9d5"/>
    <text x="473" y="681" class="pill">DETERMINISTIC CORE</text>

    <rect x="644" y="656" rx="18" ry="18" width="179" height="40" fill="#f6cbb9"/>
    <text x="677" y="681" class="pill" fill="#7c3519">OPTIONAL AI LAYER</text>
  </g>

  <text x="936" y="168" class="section">Generated Artifacts</text>
  <g class="shadow">
    <rect x="900" y="195" rx="24" ry="24" width="300" height="160" fill="url(#artifact)" stroke="#c8baa5"/>
    <text x="930" y="233" class="cardTitle">Core Outputs</text>
    <text x="930" y="264" class="cardBody">`recipe_master.csv`</text>
    <text x="930" y="289" class="cardBody">`comment_signals.csv`</text>
    <text x="930" y="314" class="cardBody">`recipe_intelligence.csv`</text>
    <text x="930" y="339" class="cardBody">`recipe_evidence.csv`</text>
  </g>
  <g class="shadow">
    <rect x="900" y="375" rx="24" ry="24" width="300" height="170" fill="url(#artifact)" stroke="#c8baa5"/>
    <text x="930" y="413" class="cardTitle">Editorial Object</text>
    <text x="930" y="444" class="cardBody">`editorial_intelligence.csv`</text>
    <text x="930" y="469" class="cardBody">`editorial_intelligence.jsonl`</text>
    <text x="930" y="494" class="cardBody">Metadata, decision, signals,</text>
    <text x="930" y="517" class="cardBody">evidence, readiness, LLM input</text>
  </g>
  <g class="shadow">
    <rect x="900" y="565" rx="24" ry="24" width="300" height="150" fill="url(#artifact)" stroke="#c8baa5"/>
    <text x="930" y="603" class="cardTitle">Optional AI Outputs</text>
    <text x="930" y="634" class="cardBody">Fix-aware recommendations</text>
    <text x="930" y="659" class="cardBody">LLM summaries + evals</text>
    <text x="930" y="684" class="cardBody">RAG corpus JSONL</text>
  </g>

  <text x="1270" y="168" class="section">Application Layer</text>
  <g class="shadow">
    <rect x="1240" y="195" rx="28" ry="28" width="280" height="300" fill="url(#web)"/>
    <text x="1270" y="235" class="cardTitleDark">Next.js Read Model</text>
    <text x="1270" y="263" class="cardBodyDark">`web/lib/data/recipe-master.ts`</text>
    <text x="1270" y="305" class="cardBodyDark">Reads CSV + JSONL artifacts</text>
    <text x="1270" y="330" class="cardBodyDark">Builds unified `RecipeRow`</text>
    <text x="1270" y="355" class="cardBodyDark">Merges deterministic + AI data</text>
    <text x="1270" y="397" class="cardBodyDark">Routes:</text>
    <text x="1270" y="422" class="cardBodyDark">Homepage</text>
    <text x="1270" y="447" class="cardBodyDark">Editor dashboard</text>
    <text x="1270" y="472" class="cardBodyDark">Recipe detail + RAG API</text>
  </g>

  <g class="shadow">
    <rect x="1240" y="530" rx="24" ry="24" width="280" height="185" fill="#fffdfa" stroke="#d7cab6"/>
    <text x="1270" y="570" class="cardTitle">Editor Experience</text>
    <text x="1270" y="602" class="cardBody">1. Select creator</text>
    <text x="1270" y="627" class="cardBody">2. Triage top recipes to fix</text>
    <text x="1270" y="652" class="cardBody">3. Review deterministic issue</text>
    <text x="1270" y="677" class="cardBody">4. Inspect evidence and optional AI</text>
  </g>

  <path d="M 360 280 C 386 280, 388 280, 410 280" fill="none" stroke="#2c3a3f" stroke-width="3.5" marker-end="url(#arrow)"/>
  <path d="M 360 486 C 386 486, 388 486, 410 486" fill="none" stroke="#2c3a3f" stroke-width="3.5" marker-end="url(#arrow)"/>
  <text x="366" y="262" class="arrowLabel">raw comments</text>
  <text x="366" y="468" class="arrowLabel">recipe context</text>

  <path d="M 860 455 C 878 455, 882 455, 900 455" fill="none" stroke="#2c3a3f" stroke-width="3.5" marker-end="url(#arrow)"/>
  <text x="870" y="438" class="arrowLabel">versioned artifacts</text>

  <path d="M 1200 455 C 1218 455, 1222 455, 1240 455" fill="none" stroke="#2c3a3f" stroke-width="3.5" marker-end="url(#arrow)"/>
  <text x="1215" y="438" class="arrowLabel">local disk reads</text>

  <path d="M 1380 495 C 1380 510, 1380 514, 1380 530" fill="none" stroke="#2c3a3f" stroke-width="3.5" marker-end="url(#arrow)"/>
  <text x="1395" y="515" class="arrowLabel">UI workflow</text>

  <g>
    <rect x="410" y="780" rx="22" ry="22" width="1110" height="130" fill="#fbf8f2" stroke="#d9cdbd"/>
    <text x="442" y="820" class="cardTitle">Core design rule</text>
    <text x="442" y="852" class="cardBody">Deterministic decision is the source of truth. Evidence is the trust layer. AI summaries and RAG are optional, gated enhancements that never replace the primary editorial diagnosis.</text>
    <text x="442" y="892" class="small">This matches the current implementation in `build_recipe_intelligence.py`, `build_editorial_intelligence.py`, `build_recommended_edit_with_fixes.py`, and `web/lib/server/rag.ts`.</text>
  </g>
</svg>
